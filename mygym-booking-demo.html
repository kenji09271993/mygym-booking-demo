<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Gym | 予約システム デモ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --coral:#FF4B4B;
    --sun:#FFC93C;
    --sky:#2FA8E0;
    --leaf:#3FAE6A;
    --navy:#1B2A4A;
    --cream:#FFF8EC;
    --line:#EFE4CE;
    --gray:#8A8578;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);color:var(--navy);font-family:'Zen Kaku Gothic New',sans-serif;}
  h1,h2,h3,.brand,.slot-time,.stepnum{font-family:'Fredoka',sans-serif;}

  /* ---- Header ---- */
  header{background:var(--navy);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .brand{font-size:22px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:8px;}
  .brand span{color:var(--sun);}
  .user-chip{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);padding:6px 14px 6px 6px;border-radius:999px;font-size:13px;}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--coral);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}

  /* ---- Page shell ---- */
  .shell{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}
  .page-title{display:flex;align-items:baseline;gap:12px;margin-bottom:4px;}
  .page-title h1{font-size:28px;margin:0;}
  .badge-draft{font-size:11px;background:var(--sun);color:var(--navy);padding:3px 10px;border-radius:999px;font-weight:700;}
  .sub{color:var(--gray);font-size:13.5px;margin:0 0 24px;}

  /* ---- Child card ---- */
  .child-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:22px;box-shadow:0 2px 0 var(--line);}
  .child-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--sky),var(--leaf));flex-shrink:0;}
  .child-card .name{font-weight:700;font-size:15.5px;}
  .child-card .meta{font-size:12.5px;color:var(--gray);}
  .child-tag{margin-left:auto;background:#F3F8FF;color:var(--sky);border:1px solid #D6ECFB;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;}

  /* ---- Controls ---- */
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px;}
  select{appearance:none;background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0l5 6 5-6z" fill="%231B2A4A"/></svg>') no-repeat right 12px center;border:1.5px solid var(--line);border-radius:10px;padding:9px 32px 9px 14px;font-size:13.5px;font-family:inherit;color:var(--navy);cursor:pointer;font-weight:500;}
  .view-toggle{margin-left:auto;display:flex;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:3px;}
  .view-toggle button{border:none;background:none;padding:7px 16px;font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;color:var(--gray);font-family:inherit;}
  .view-toggle button.active{background:var(--navy);color:#fff;}

  /* ---- Legend ---- */
  .legend{display:flex;gap:16px;font-size:12px;color:var(--gray);margin-bottom:14px;}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px;}

  /* ---- Calendar view ---- */
  .cal-wrap{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 2px 0 var(--line);}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);}
  .cal-nav button{background:var(--cream);border:1px solid var(--line);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:14px;}
  .cal-grid{display:grid;grid-template-columns:70px repeat(6,1fr);}
  .cal-grid .head{padding:10px 6px;text-align:center;font-size:12.5px;font-weight:700;border-bottom:1px solid var(--line);border-left:1px solid var(--line);background:#FBF6EA;}
  .cal-grid .head.today{color:var(--coral);}
  .cal-grid .timecol{padding:10px 6px;font-size:11px;color:var(--gray);text-align:right;border-top:1px solid var(--line);}
  .cal-cell{border-top:1px solid var(--line);border-left:1px solid var(--line);min-height:64px;padding:5px;}
  .slot{border-radius:8px;padding:6px 7px;font-size:11px;font-weight:700;cursor:pointer;line-height:1.35;transition:transform .1s;}
  .slot:hover{transform:translateY(-1px);}
  .slot.open{background:#EAF7EF;color:var(--leaf);border:1px solid #C7EBD4;}
  .slot.few{background:#FFF3D9;color:#B4780A;border:1px solid #FFE3A0;}
  .slot.full{background:#F3F1EA;color:#B4AD9B;border:1px solid #E5DFCF;cursor:not-allowed;}
  .slot.mine{background:var(--navy);color:#fff;border:1px solid var(--navy);}
  .slot .cnt{display:block;font-weight:500;opacity:.85;font-size:10px;}

  /* ---- List view ---- */
  .list{display:flex;flex-direction:column;gap:10px;}
  .row{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 0 var(--line);}
  .row .date{width:64px;text-align:center;flex-shrink:0;}
  .row .date .d{font-family:'Fredoka',sans-serif;font-size:22px;font-weight:700;line-height:1;}
  .row .date .w{font-size:11px;color:var(--gray);}
  .row .info{flex:1;min-width:0;}
  .row .cls{font-weight:700;font-size:14.5px;}
  .row .meta{font-size:12.5px;color:var(--gray);margin-top:2px;}
  .row .cap{width:120px;flex-shrink:0;}
  .cap-bar{height:6px;background:#F0EBDD;border-radius:99px;overflow:hidden;margin-top:5px;}
  .cap-bar > div{height:100%;border-radius:99px;}
  .cap-txt{font-size:11px;color:var(--gray);}
  .btn{border:none;border-radius:10px;padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .btn-book{background:var(--coral);color:#fff;}
  .btn-book:disabled{background:#EDE8DA;color:#B4AD9B;cursor:not-allowed;}
  .btn-book.mine{background:var(--navy);}

  /* ---- My bookings ---- */
  .mysec{margin-top:34px;}
  .mysec h2{font-size:17px;margin:0 0 12px;}
  .mybook{background:#fff;border:1px solid var(--line);border-left:4px solid var(--sky);border-radius:12px;padding:13px 18px;display:flex;align-items:center;gap:14px;margin-bottom:8px;}
  .mybook .cls{font-weight:700;font-size:14px;}
  .mybook .meta{font-size:12px;color:var(--gray);}
  .link-cancel{margin-left:auto;background:none;border:none;color:var(--coral);font-size:12.5px;font-weight:700;cursor:pointer;text-decoration:underline;}

  /* ---- Modal ---- */
  .overlay{position:fixed;inset:0;background:rgba(27,42,74,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .overlay.show{display:flex;}
  .modal{background:#fff;border-radius:18px;max-width:400px;width:100%;padding:26px;}
  .modal h3{margin:0 0 4px;font-size:19px;}
  .modal .sub2{font-size:12.5px;color:var(--gray);margin-bottom:18px;}
  .modal .details{background:var(--cream);border-radius:12px;padding:14px 16px;font-size:13px;line-height:2;margin-bottom:18px;}
  .modal .details b{float:right;}
  .modal-actions{display:flex;gap:10px;}
  .btn-ghost{flex:1;background:#fff;border:1.5px solid var(--line);color:var(--navy);border-radius:10px;padding:11px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:inherit;}
  .btn-confirm{flex:1;background:var(--coral);border:none;color:#fff;border-radius:10px;padding:11px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:inherit;}
  .success{text-align:center;padding:6px 0;}
  .success .check{width:52px;height:52px;border-radius:50%;background:#EAF7EF;color:var(--leaf);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;}

  @media(max-width:820px){
    .cal-grid{grid-template-columns:44px repeat(6,minmax(80px,1fr));overflow-x:auto;}
    .cal-wrap{overflow-x:auto;}
    .row{flex-wrap:wrap;}
    .row .cap{width:auto;order:3;flex:1 1 100%;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">My<span>Gym</span> ｜ 予約 <span style="font-size:11px;background:rgba(255,255,255,.15);padding:2px 8px;border-radius:6px;margin-left:4px;">DEMO</span></div>
  <div class="user-chip"><div class="avatar">花</div>山田 花子 様</div>
</header>

<div class="shell">
  <div class="page-title"><h1>クラス予約</h1><span class="badge-draft">叩き台デモ</span></div>
  <p class="sub">既存会員のお子様のクラスを、教室・日程に合わせて予約できます。</p>

  <div class="child-card">
    <div class="child-avatar"></div>
    <div>
      <div class="name">ゆい ちゃん（2歳3ヶ月）</div>
      <div class="meta">現在の受講クラス：ジムスターズ｜武蔵小杉校</div>
    </div>
    <div class="child-tag">● 会員（受講中）</div>
  </div>

  <div class="controls">
    <select id="fLocation"></select>
    <select id="fClass"></select>
    <div class="view-toggle">
      <button id="btnCal" class="active">カレンダー</button>
      <button id="btnList">リスト</button>
    </div>
  </div>

  <div class="legend">
    <span><i style="background:#C7EBD4"></i>空きあり</span>
    <span><i style="background:#FFE3A0"></i>残りわずか</span>
    <span><i style="background:#E5DFCF"></i>満席</span>
    <span><i style="background:var(--navy)"></i>ゆいちゃん受講中クラス</span>
  </div>

  <div id="calView" class="cal-wrap">
    <div class="cal-nav">
      <button onclick="shiftWeek(-1)">‹</button>
      <div id="weekLabel" style="font-weight:700;font-size:14px;"></div>
      <button onclick="shiftWeek(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div id="listView" class="list" style="display:none;"></div>

  <div class="mysec">
    <h2>マイ予約（今後の予定）</h2>
    <div id="myBookings"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modalBody"></div>
</div>

<script>
const LOCATIONS = ["全教室","広尾校","豊洲校","品川校","吉祥寺校","自由が丘校","武蔵小杉校","栄校","グラングリーン大阪校","岩田屋天神校"];
const CLASSES = ["すべてのクラス","リトルバンドルズ","タイニータイクス","ワドラーズ","ジムスターズ","テリフィックトッツ","マイティーマイツ","ウィズキッズ","ワールドスポーツ","ワールドアート","ワールドプログラミング"];
const MY_CLASS = "ジムスターズ", MY_LOCATION = "武蔵小杉校", MY_CHILD = "ゆいちゃん";
const TIMES = ["10:00","11:00","14:00","15:00","16:00","17:00"];
const DAYS = ["月","火","水","木","金","土"];

// ---- mock slot generator (deterministic pseudo-random) ----
function seedRand(seed){let x=Math.sin(seed)*10000;return x-Math.floor(x);}
function buildSlots(weekOffset){
  const slots=[];
  let s=weekOffset*97+1;
  DAYS.forEach((day,di)=>{
    TIMES.forEach((t,ti)=>{
      s+=1;
      const r=seedRand(s);
      if(r<0.35) return; // no class that slot
      const loc = LOCATIONS[1+Math.floor(seedRand(s*3)*8)];
      const cls = CLASSES[1+Math.floor(seedRand(s*7)*10)];
      const cap = 8;
      let booked = Math.floor(seedRand(s*5)*9);
      const isMine = (loc===MY_LOCATION && cls===MY_CLASS && di===2 && t==="16:00" && weekOffset===0);
      if(isMine) booked = 6;
      slots.push({day,di,t,loc,cls,cap,booked,isMine});
    });
  });
  return slots;
}

let weekOffset=0;
let myBookings=[{cls:MY_CLASS,loc:MY_LOCATION,day:"水",date:"7/16",t:"16:00"}];
let currentView='cal';

const fLocation=document.getElementById('fLocation');
const fClass=document.getElementById('fClass');
LOCATIONS.forEach(l=>fLocation.innerHTML+=`<option ${l===MY_LOCATION?'selected':''}>${l}</option>`);
CLASSES.forEach(c=>fClass.innerHTML+=`<option>${c}</option>`);
fLocation.value="全教室"; // start broad per requirement (全教室対応)
fClass.value="すべてのクラス";

document.getElementById('btnCal').onclick=()=>switchView('cal');
document.getElementById('btnList').onclick=()=>switchView('list');
function switchView(v){
  currentView=v;
  document.getElementById('btnCal').classList.toggle('active',v==='cal');
  document.getElementById('btnList').classList.toggle('active',v==='list');
  document.getElementById('calView').style.display=v==='cal'?'block':'none';
  document.getElementById('listView').style.display=v==='list'?'flex':'none';
  render();
}
fLocation.onchange=render; fClass.onchange=render;

function shiftWeek(n){weekOffset+=n; render();}

function filtered(){
  const loc=fLocation.value, cls=fClass.value;
  return buildSlots(weekOffset).filter(s=>
    (loc==="全教室"||s.loc===loc) && (cls==="すべてのクラス"||s.cls===cls)
  );
}

function statusOf(s){
  if(s.isMine) return 'mine';
  const left=s.cap-s.booked;
  if(left<=0) return 'full';
  if(left<=2) return 'few';
  return 'open';
}

function weekDates(){
  // fabricate a base date 2026-07-13 (Mon) + offset weeks
  const base=new Date(2026,6,13);
  base.setDate(base.getDate()+weekOffset*7);
  return DAYS.map((d,i)=>{const dt=new Date(base);dt.setDate(base.getDate()+i);return `${dt.getMonth()+1}/${dt.getDate()}`;});
}

function render(){
  const slots=filtered();
  const dates=weekDates();
  document.getElementById('weekLabel').textContent=`${dates[0]} 〜 ${dates[5]}（週）`;

  if(currentView==='cal'){
    const grid=document.getElementById('calGrid');
    let html='<div class="head"></div>';
    DAYS.forEach((d,i)=>html+=`<div class="head${weekOffset===0&&i===2?' today':''}">${d}<br><span style="font-weight:400;color:var(--gray)">${dates[i]}</span></div>`);
    TIMES.forEach(t=>{
      html+=`<div class="timecol">${t}</div>`;
      DAYS.forEach((d,di)=>{
        const match=slots.filter(s=>s.di===di && s.t===t);
        html+=`<div class="cal-cell">`+match.map(s=>{
          const st=statusOf(s);
          const left=s.cap-s.booked;
          return `<div class="slot ${st}" onclick='openModal(${JSON.stringify(s)})'>${s.cls}<span class="cnt">${s.loc.replace('校','')}・${st==='full'?'満席':st==='mine'?'予約済':`残${left}`}</span></div>`;
        }).join('')+`</div>`;
      });
    });
    grid.innerHTML=html;
  } else {
    const list=document.getElementById('listView');
    const dates=weekDates();
    const sorted=[...slots].sort((a,b)=>a.di-b.di||a.t.localeCompare(b.t));
    if(sorted.length===0){list.innerHTML='<div class="row" style="justify-content:center;color:var(--gray);">該当する空き枠がありません。条件を変更してください。</div>';return;}
    list.innerHTML=sorted.map(s=>{
      const st=statusOf(s);
      const left=s.cap-s.booked;
      const pct=Math.round(s.booked/s.cap*100);
      const barColor= st==='full'?'#B4AD9B':st==='few'?'#FFC93C':'#3FAE6A';
      return `<div class="row">
        <div class="date"><div class="d">${dates[s.di].split('/')[1]}</div><div class="w">${DAYS[s.di]}曜 ${s.t}</div></div>
        <div class="info">
          <div class="cls">${s.cls}${s.isMine?' <span style="color:var(--sky);font-size:11px;">・ゆいちゃん受講中</span>':''}</div>
          <div class="meta">${s.loc}｜定員 ${s.cap}名</div>
        </div>
        <div class="cap">
          <div class="cap-txt">${st==='full'?'満席':`残り${left}枠`}</div>
          <div class="cap-bar"><div style="width:${pct}%;background:${barColor}"></div></div>
        </div>
        <button class="btn btn-book ${s.isMine?'mine':''}" ${st==='full'?'disabled':''} onclick='openModal(${JSON.stringify(s)})'>${s.isMine?'予約変更':st==='full'?'満席':'予約する'}</button>
      </div>`;
    }).join('');
  }
  renderMyBookings();
}

function renderMyBookings(){
  const el=document.getElementById('myBookings');
  if(myBookings.length===0){el.innerHTML='<div class="mybook" style="border-left-color:var(--line);color:var(--gray);">現在予約はありません。</div>';return;}
  el.innerHTML=myBookings.map((b,i)=>`
    <div class="mybook">
      <div><div class="cls">${b.cls}</div><div class="meta">${b.loc}｜${b.date}（${b.day}）${b.t}〜｜${MY_CHILD}</div></div>
      <button class="link-cancel" onclick="cancelBooking(${i})">キャンセル</button>
    </div>`).join('');
}
function cancelBooking(i){myBookings.splice(i,1);renderMyBookings();}

function openModal(s){
  const dates=weekDates();
  const left=s.cap-s.booked;
  const full=left<=0 && !s.isMine;
  document.getElementById('modalBody').innerHTML=`
    <h3>${s.isMine?'予約内容の確認':'予約内容を確認'}</h3>
    <div class="sub2">${MY_CHILD}のクラス予約</div>
    <div class="details">
      <div>クラス <b>${s.cls}</b></div>
      <div>教室 <b>${s.loc}</b></div>
      <div>日時 <b>${dates[s.di]}（${DAYS[s.di]}）${s.t}〜</b></div>
      <div>空き状況 <b>${full?'満席':s.isMine?'予約済み':`残り${left}枠`}</b></div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">閉じる</button>
      <button class="btn-confirm" ${full?'disabled style="opacity:.4;cursor:not-allowed;"':''} onclick='confirmBooking(${JSON.stringify(s)})'>${s.isMine?'この内容で確定':'予約を確定する'}</button>
    </div>`;
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
function confirmBooking(s){
  const dates=weekDates();
  if(!s.isMine){myBookings.push({cls:s.cls,loc:s.loc,day:DAYS[s.di],date:dates[s.di],t:s.t});}
  document.getElementById('modalBody').innerHTML=`
    <div class="success">
      <div class="check">✓</div>
      <h3>予約が完了しました</h3>
      <div class="sub2">${s.cls}｜${s.loc}｜${dates[s.di]}（${DAYS[s.di]}）${s.t}〜</div>
      <button class="btn-confirm" style="width:100%;margin-top:14px;" onclick="closeModal();render();">閉じる</button>
    </div>`;
}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});

render();
</script>
</body>
</html>
